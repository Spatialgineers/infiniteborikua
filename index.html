  cursor: ew-resize;

.lil-gui .controller.number .slider.active {

}
.lil-gui .controller.number .slider.active .fill {
  opacity: 0.95;
}
.lil-gui .controller.number .fill {
  height: 100%;

  box-sizing: content-box;
}

.lil-gui-dragging .lil-gui {

.lil-gui-dragging * {
  cursor: ew-resize !important;

  height: var(--title-height);

  cursor: pointer;
  outline: none;
  text-decoration-skip: objects;

.lil-gui .title:before {

.lil-gui.closed > .children {

}

}
.lil-gui.transition > .children {
  transition-duration: 300ms;

  pointer-events: none;

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- SISTEMA DE EXPORTACIÓN & ESTADO INICIAL ---
        const isExported = window.IS_EXPORTED || false;

        const patternTextures = {
            'Base Verde': 'https://static.wixstatic.com/media/fe81a7_07aecfdb3b044909b0b267dfe7eecd96~mv2.png',
            'Lx Musx': 'https://static.wixstatic.com/media/fe81a7_8e633cf8bcb3446d9b4cbe133dfcbce1~mv2.png',
            'Roelephantom': 'https://static.wixstatic.com/media/fe81a7_92284537ab6d4d85b7f0143599e927a8~mv2.png',
            'Roots Disorder': 'https://static.wixstatic.com/media/fe81a7_92284537ab6d4d85b7f0143599e927a8~mv2.png',
            'Dark Cupcake': 'https://static.wixstatic.com/media/fe81a7_57282853d2e74770ba081e88b6fe01fa~mv2.png',
            'The Highgineer': 'https://static.wixstatic.com/media/fe81a7_a5474248be1d408eb59d4a90872ecd2a~mv2.png',
            'Kstillo': 'https://static.wixstatic.com/media/fe81a7_c2420b5aecb246ad9d3af8266aeebfd5~mv2.png'
        };

        const SGX = {
            targetCamX: 0, targetCamY: 0,
            currentCamX: 0, currentCamY: 0,
            targetAngle: 0, currentAngle: 0,
            currentCamZBase: 8,
            trackingMode: 'Idle',
            
            config: {
                boxWidth: 26, boxHeight: 16, boxDepth: 26,
                boxTextureUrl: patternTextures['Base Verde'],
                textureScale: 0.15,
                showGrids: true,
                camDistance: 8,
                modo: 'Portal (Físico)',
                amplitudX: 12.0, amplitudY: 8.0, suavizado: 0.05,
                invertirX: false, invertirY: false,
                activeFrame: 0,
                frameStyle: 'Neon Glow',
                remoteImageUrl: 'https://static.wixstatic.com/media/fe81a7_52e1c777fa55462290827691e4b3d3b2~mv2.png',
                
                // Callbacks
                injectRemote: () => GalleryManager.injectTexture(SGX.config.activeFrame, SGX.config.remoteImageUrl),
                uploadAction: () => document.getElementById('local-image-upload').click(),
                resetFrames: () => GalleryManager.resetDefaultTextures(),
                exportAction: () => exportGallery()
            }
        };

        if (isExported && window.EXPORTED_CONFIG) {
            Object.assign(SGX.config, window.EXPORTED_CONFIG);
        }

        // --- EXPORT FUNCTION ---
        function exportGallery() {
            // Guardamos el estado actual
            const configPayload = JSON.stringify({
                boxWidth: SGX.config.boxWidth,
                boxHeight: SGX.config.boxHeight,
                boxDepth: SGX.config.boxDepth,
                boxTextureUrl: SGX.config.boxTextureUrl,
                textureScale: SGX.config.textureScale,
                showGrids: SGX.config.showGrids,
                camDistance: SGX.config.camDistance,
                modo: SGX.config.modo,
                amplitudX: SGX.config.amplitudX,
                amplitudY: SGX.config.amplitudY,
                suavizado: SGX.config.suavizado,
                invertirX: SGX.config.invertirX,
                invertirY: SGX.config.invertirY,
                frameStyle: SGX.config.frameStyle,
                frameUrls: GalleryManager.frames.map(f => f.url)
            });

            // Clonar el DOM actual
            const htmlClone = document.documentElement.cloneNode(true);
            
            // Limpiar la UI de personalización (lil-gui) en la versión final exportada 
            // Esto asegura que el script regenerará la UI limpiamente sin duplicados al abrir el archivo.
            htmlClone.querySelectorAll('.lil-gui').forEach(el => el.remove());
            // Limpiamos los tags de script de configuración previos si existen
            htmlClone.querySelectorAll('script#export-config').forEach(el => el.remove());
            
            // Ocultar elementos de UI no deseados en el embed
            htmlClone.querySelectorAll('#ui-layer').forEach(el => el.style.display = 'none');
            htmlClone.querySelectorAll('#btn-ai-toggle').forEach(el => el.style.display = 'none');
            htmlClone.querySelectorAll('#hud').forEach(el => el.style.display = 'none');

            // Inyectar el estado al clon
            const script = document.createElement('script');
            script.id = 'export-config';
            script.textContent = `window.IS_EXPORTED = true; window.EXPORTED_CONFIG = ${configPayload};`;
            htmlClone.querySelector('head').insertBefore(script, htmlClone.querySelector('head').firstChild);

            const finalHTML = '<!DOCTYPE html>\n<html lang="es">\n' + htmlClone.innerHTML + '\n</html>';
            
            // Descargar el archivo
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "SGX_Infinite_Borikua_Galeria.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.018);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.getElementById('scene-container').appendChild(renderer.domElement);

        const amb = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(amb);
        const spot = new THREE.SpotLight(0xffffff, 1.8);
        spot.position.set(0, 10, 5);
        spot.angle = Math.PI / 3;
        spot.penumbra = 0.6;
        spot.decay = 2;
        spot.distance = 60;
        scene.add(spot);

        // --- 1. ENTORNO PARAMÉTRICO ---
        let roomGroup = new THREE.Group();
        scene.add(roomGroup);
        let roomMesh, gridBottom, gridTop;

        const boxTexLoader = new THREE.TextureLoader();
        boxTexLoader.setCrossOrigin('anonymous');
        let currentTexUrl = '';
        let baseTex = null;

        function initRoom() {
            roomMesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), []);
            roomGroup.add(roomMesh);
            GalleryManager.buildFrames(SGX.config.boxWidth, SGX.config.boxHeight, SGX.config.boxDepth);
            updateRoomDimensions(); 
        }

        function updateRoomDimensions() {
            const { boxWidth: w, boxHeight: h, boxDepth: d, textureScale: tScale } = SGX.config;
            
            if (currentTexUrl !== SGX.config.boxTextureUrl) {
                currentTexUrl = SGX.config.boxTextureUrl;
                baseTex = boxTexLoader.load(currentTexUrl);
                baseTex.wrapS = THREE.RepeatWrapping;
                baseTex.wrapT = THREE.RepeatWrapping;
                baseTex.encoding = THREE.sRGBEncoding;
            }

            roomMesh.geometry.dispose();
            roomMesh.geometry = new THREE.BoxGeometry(w, h, d);

            const createWallMat = (repeatU, repeatV) => {
                const tex = baseTex.clone();
                // IMPORTANTE: Repeat U negativo corrige el efecto espejo "hacia afuera"
                tex.repeat.set(-repeatU * tScale, repeatV * tScale);
                tex.needsUpdate = true;
                return new THREE.MeshStandardMaterial({
                    map: tex,
                    color: 0x777777, 
                    side: THREE.BackSide,
                    roughness: 0.9,
                    metalness: 0.1
                });
            };

            const matX = createWallMat(d, h); 
            const matY = createWallMat(w, d); 
            const matZ = createWallMat(w, h); 

            if (roomMesh.material && roomMesh.material.length > 0) {
                roomMesh.material.forEach(m => {
                    if (m.map) m.map.dispose();
                    m.dispose();
                });
            }

            roomMesh.material = [matX, matX, matY, matY, matZ, matZ];

            if (gridBottom) { gridBottom.geometry.dispose(); roomGroup.remove(gridBottom); gridBottom = null; }
            if (gridTop) { gridTop.geometry.dispose(); roomGroup.remove(gridTop); gridTop = null; }

            if (SGX.config.showGrids) {
                gridBottom = new THREE.GridHelper(Math.max(w, d), 25, 0x32527B, 0x111111);
                gridBottom.position.y = -h / 2 + 0.05;
                roomGroup.add(gridBottom);
                
                gridTop = new THREE.GridHelper(Math.max(w, d), 25, 0xFDCC0D, 0x111111);
                gridTop.position.y = h / 2 - 0.05;
                roomGroup.add(gridTop);
            }

            if (GalleryManager.frames.length > 0) {
                GalleryManager.updateFramePositions(w, h, d);
            }
        }

        // --- 2. GALLERY MANAGER ---
        const textureLoader = new THREE.TextureLoader();
        textureLoader.setCrossOrigin('anonymous');
        
        const GalleryManager = {
            frames: [],
            wallTitles: [],
            
            createLabelMesh: function(text) {
                if (!text) return null;
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'rgba(10, 10, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#32527B';
                ctx.lineWidth = 12;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);

                ctx.font = 'bold 70px "Courier New", Courier, monospace';
                ctx.fillStyle = '#FDCC0D';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(text, canvas.width / 2, canvas.height / 2);

                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
                const geo = new THREE.PlaneGeometry(4, 1);
                return new THREE.Mesh(geo, mat);
            },

            createWallTitle: function(text) {
                const canvas = document.createElement('canvas');
                canvas.width = 2048;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'transparent';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 120px "Courier New", Courier, monospace';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#FDCC0D';
                ctx.shadowBlur = 20;
                ctx.fillText(text, canvas.width / 2, canvas.height / 2);

                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
                const geo = new THREE.PlaneGeometry(18, 2.2);
                return new THREE.Mesh(geo, mat);
            },

            buildFrames: function(w, h, d) {
                // Limpieza
                this.frames.forEach(f => {
                    scene.remove(f.group);
                    if(f.canvasMesh.geometry) f.canvasMesh.geometry.dispose();
                    if(f.canvasMesh.material.map) f.canvasMesh.material.map.dispose();
                    f.canvasMesh.material.dispose();
                    if(f.borderMesh.geometry) f.borderMesh.geometry.dispose();
                    f.borderMesh.material.dispose();
                    if(f.labelMesh) {
                        f.labelMesh.geometry.dispose();
                        f.labelMesh.material.map.dispose();
                        f.labelMesh.material.dispose();
                    }
                });
                this.frames = [];

                this.wallTitles.forEach(t => {
                    scene.remove(t);
                    t.geometry.dispose();
                    t.material.map.dispose();
                    t.material.dispose();
                });
                this.wallTitles = [];

                // Titulos de paredes
                const titleLeft = this.createWallTitle("PATRONES");
                titleLeft.rotation.y = Math.PI/2;
                scene.add(titleLeft);
                this.wallTitles.push(titleLeft);

                const titleRight = this.createWallTitle("CONCEPTOS");
                titleRight.rotation.y = -Math.PI/2;
                scene.add(titleRight);
                this.wallTitles.push(titleRight);

                const titleCredits = this.createWallTitle("CRÉDITOS Y CREADORES");
                titleCredits.rotation.y = Math.PI;
                scene.add(titleCredits);
                this.wallTitles.push(titleCredits);

                const framesData = [
                    { height: 8, label: '' }, // 0: Logo Fondo
                    { height: 4.2, label: 'Lx Musx' }, // 1
                    { height: 4.2, label: 'Roelephantom' }, // 2
                    { height: 4.2, label: 'Roots Disorder' }, // 3
                    { height: 4.2, label: 'Dark Cupcake' }, // 4
                    { height: 4.2, label: 'The Highgineer' }, // 5
                    { height: 4.2, label: 'Kstillo' }, // 6
                    { height: 4.2, label: 'Collar de Cemi' }, // 7
                    { height: 4.2, label: 'Pantallas' }, // 8
                    { height: 4.2, label: 'Pulseras' }, // 9
                    { height: 4.2, label: 'The Highgineer/Kstillo' }, // 10
                    { height: 4.2, label: 'Lx Musx/Roelephantom' }, // 11
                    { height: 4.2, label: 'Dark Cupcake/Roots Disorder' }, // 12
                    { height: 8, label: '' } // 13: Creditos
                ];

                framesData.forEach((data, index) => {
                    const group = new THREE.Group();
                    
                    const canvasMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
                    const canvasGeo = new THREE.PlaneGeometry(data.height, data.height);
                    const canvasMesh = new THREE.Mesh(canvasGeo, canvasMat);
                    
                    const borderGeo = new THREE.BoxGeometry(data.height + 0.4, data.height + 0.4, 0.2);
                    const borderMat = this.getStyleMaterial();
                    const borderMesh = new THREE.Mesh(borderGeo, borderMat);
                    borderMesh.position.z = -0.15;

                    group.add(borderMesh);
                    group.add(canvasMesh);

                    let labelMesh = null;
                    if(data.label) {
                        labelMesh = this.createLabelMesh(data.label);
                        labelMesh.position.set(0, -(data.height / 2) - 0.7, 0);
                        group.add(labelMesh);
                    }
                    
                    if(index === 0) group.rotation.y = 0;
                    else if(index >= 1 && index <= 6) group.rotation.y = Math.PI/2;
                    else if(index >= 7 && index <= 12) group.rotation.y = -Math.PI/2;
                    else group.rotation.y = Math.PI;
                    
                    scene.add(group);
                    this.frames.push({ group, canvasMesh, borderMesh, labelMesh, height: data.height, url: '' });
                });

                this.resetDefaultTextures();
            },

            updateFramePositions: function(w, h, d) {
                if(this.wallTitles.length >= 3) {
                    this.wallTitles[0].position.set(-w/2 + 0.15, h/2 - 2, 0); // Patrones
                    this.wallTitles[1].position.set(w/2 - 0.15, h/2 - 2, 0); // Conceptos
                    this.wallTitles[2].position.set(0, h/2 - 2, d/2 - 0.15); // Creditos
                }

                const frameConfigs = [
                    { px: 0, py: 0, pz: -d/2 + 0.1 },
                    // Patrones
                    { px: -w/2 + 0.1, py: h/5, pz: -d/3.2 },
                    { px: -w/2 + 0.1, py: h/5, pz: 0 },
                    { px: -w/2 + 0.1, py: h/5, pz: d/3.2 },
                    { px: -w/2 + 0.1, py: -h/5, pz: -d/3.2 },
                    { px: -w/2 + 0.1, py: -h/5, pz: 0 },
                    { px: -w/2 + 0.1, py: -h/5, pz: d/3.2 },
                    // Conceptos
                    { px: w/2 - 0.1, py: h/5, pz: -d/3.2 },
                    { px: w/2 - 0.1, py: h/5, pz: 0 },
                    { px: w/2 - 0.1, py: h/5, pz: d/3.2 },
                    { px: w/2 - 0.1, py: -h/5, pz: -d/3.2 },
                    { px: w/2 - 0.1, py: -h/5, pz: 0 },
                    { px: w/2 - 0.1, py: -h/5, pz: d/3.2 },
                    // Creditos
                    { px: 0, py: 0, pz: d/2 - 0.1 }
                ];

                this.frames.forEach((f, i) => {
                    const config = frameConfigs[i];
                    if(config) {
                        f.group.position.set(config.px, config.py, config.pz);
                    }
                });
            },

            getStyleMaterial: function() {
                switch(SGX.config.frameStyle) {
                    case 'Neon Glow': return new THREE.MeshBasicMaterial({ color: 0xFDCC0D });
                    case 'Industrial Blue': return new THREE.MeshStandardMaterial({ color: 0x32527B, metalness: 0.8, roughness: 0.2 });
                    case 'Minimalist White': return new THREE.MeshBasicMaterial({ color: 0xffffff });
                    default: return new THREE.MeshBasicMaterial({ color: 0x444444 });
                }
            },

            updateGlobalStyle: function() {
                const newMat = this.getStyleMaterial();
                this.frames.forEach(f => {
                    f.borderMesh.material.dispose();
                    f.borderMesh.material = newMat;
                });
            },

            injectTexture: function(frameIndex, url) {
                if(!this.frames[frameIndex]) return;
                
                this.frames[frameIndex].url = url; // Registramos para exportación

                textureLoader.load(url, (texture) => {
                    texture.encoding = THREE.sRGBEncoding;
                    const aspect = texture.image.width / texture.image.height;
                    const canvasMesh = this.frames[frameIndex].canvasMesh;
                    const borderMesh = this.frames[frameIndex].borderMesh;
                    const targetH = this.frames[frameIndex].height;
                    
                    canvasMesh.geometry.dispose();
                    canvasMesh.geometry = new THREE.PlaneGeometry(targetH * aspect, targetH);
                    
                    borderMesh.geometry.dispose();
                    borderMesh.geometry = new THREE.BoxGeometry((targetH * aspect) + 0.4, targetH + 0.4, 0.2);

                    canvasMesh.material.map = texture;
                    canvasMesh.material.color.setHex(0xffffff);
                    canvasMesh.material.needsUpdate = true;
                });
            },

            resetDefaultTextures: function() {
                if (isExported && SGX.config.frameUrls && SGX.config.frameUrls.length > 0) {
                    this.frames.forEach((f, i) => {
                        if (SGX.config.frameUrls[i]) this.injectTexture(i, SGX.config.frameUrls[i]);
                    });
                    return;
                }

                const defaultUrls = [
                    'https://static.wixstatic.com/media/fe81a7_b39d8b1fd26b4cf49a7636a787d5753e~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_8e633cf8bcb3446d9b4cbe133dfcbce1~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_92284537ab6d4d85b7f0143599e927a8~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_92284537ab6d4d85b7f0143599e927a8~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_57282853d2e74770ba081e88b6fe01fa~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_a5474248be1d408eb59d4a90872ecd2a~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_c2420b5aecb246ad9d3af8266aeebfd5~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_805b74a1b73d47fa83c446130585cd72~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_543abb3e04aa4488928129ccae33875a~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_cb6714af21974fe689652004d260cbc8~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_a0b0590dc0844d1b88d21763d52696c7~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_76f32d6280db4b508bec103ffd07bcd4~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_3640b51d386445ffa6f393c73785d8af~mv2.png',
                    'https://static.wixstatic.com/media/fe81a7_737e849b909c468998928172fa1ea821~mv2.png'
                ];
                
                this.frames.forEach((f, i) => {
                    this.injectTexture(i, defaultUrls[i]);
                });
            }
        };

        // --- INICIALIZACIÓN ---
        initRoom();
        
        // Carga inicial según el estado (Exportado o Editor)
        if (isExported) {
            // Entramos directo a la simulación Manual (Embed Limpio)
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('nav-controls').style.display = 'flex';
            document.getElementById('btn-ai-toggle').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            SGX.trackingMode = 'Manual';
            // No iniciamos la GUI
        }

        // --- NAVEGACIÓN Y BOTONES ---
        document.getElementById('btn-patrones').onclick = () => {
            SGX.targetAngle = -Math.PI / 2;
            updateNavUI('btn-patrones');
        };
        document.getElementById('btn-inicio').onclick = () => {
            SGX.targetAngle = 0;
            updateNavUI('btn-inicio');
        };
        document.getElementById('btn-conceptos').onclick = () => {
            SGX.targetAngle = Math.PI / 2;
            updateNavUI('btn-conceptos');
        };
        document.getElementById('btn-creditos').onclick = () => {
            SGX.targetAngle = Math.PI;
            updateNavUI('btn-creditos');
        };

        function updateNavUI(activeId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(activeId).classList.add('active');
        }

        // --- UPLOAD HANDLER ---
        document.getElementById('local-image-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const blobUrl = URL.createObjectURL(file);
                GalleryManager.injectTexture(SGX.config.activeFrame, blobUrl);
            }
        });

        // --- GUI DEL ARQUITECTO ---
        function initGUI() {
            const gui = new GUI({ title: '⚙️ SGX ARCHITECT V4' });
            
            const galleryFolder = gui.addFolder('🖼️ Gallery Injection');
            galleryFolder.add(SGX.config, 'activeFrame', { 
                '0. Inicio': 0, 
                '1. Patrones: Lx Musx': 1, 
                '2. Patrones: Roelephantom': 2, 
                '3. Patrones: Roots Disorder': 3,
                '4. Patrones: Dark Cupcake': 4,
                '5. Patrones: The Highgineer': 5,
                '6. Patrones: Kstillo': 6,
                '7. Conceptos: Collar Cemi': 7,
                '8. Conceptos: Pantallas': 8,
                '9. Conceptos: Pulseras': 9,
                '10. Conceptos: Wayuko TH/Ks': 10,
                '11. Conceptos: Wayuko LM/Ro': 11,
                '12. Conceptos: Wayuko DC/RD': 12,
                '13. Créditos': 13
            }).name('Seleccionar Marco').onChange(v => SGX.config.activeFrame = parseInt(v));
            
            galleryFolder.add(SGX.config, 'remoteImageUrl').name('URL de Imagen');
            galleryFolder.add(SGX.config, 'injectRemote').name('🔗 Inyectar URL');
            galleryFolder.add(SGX.config, 'uploadAction').name('⬆️ Subir Local');
            
            galleryFolder.add(SGX.config, 'frameStyle', ['Neon Glow', 'Industrial Blue', 'Minimalist White', 'Dark Matter'])
                .name('Estilo Marco').onChange(() => GalleryManager.updateGlobalStyle());
            galleryFolder.add(SGX.config, 'resetFrames').name('↻ Reset Defaults');

            // NUEVO DROPDOWN PARA PAREDES
            const roomFolder = gui.addFolder('📐 Dimensiones y Entorno');
            roomFolder.add(SGX.config, 'boxTextureUrl', patternTextures).name('Textura Paredes').onChange(updateRoomDimensions);
            roomFolder.add(SGX.config, 'boxWidth', 10, 80).name('Ancho (Paredes L/R)').onChange(updateRoomDimensions);
            roomFolder.add(SGX.config, 'boxHeight', 10, 40).name('Alto (Techo)').onChange(updateRoomDimensions);
            roomFolder.add(SGX.config, 'boxDepth', 10, 80).name('Profundidad (Frente/Fondo)').onChange(updateRoomDimensions);
            roomFolder.add(SGX.config, 'camDistance', 0, 30).name('Distancia Cámara Base');

            const physFolder = gui.addFolder('🔋 Tracking Physics');
            physFolder.add(SGX.config, 'modo', ['Portal (Físico)', 'Espejo (Sigue Mirada)']);
            physFolder.add(SGX.config, 'amplitudX', 1, 30).name('Amplitud X');
            physFolder.add(SGX.config, 'amplitudY', 1, 30).name('Amplitud Y');
            physFolder.add(SGX.config, 'suavizado', 0.001, 0.5).name('Inercia');
            physFolder.add(SGX.config, 'invertirX').name('Invertir X');
            physFolder.add(SGX.config, 'invertirY').name('Invertir Y');

            gui.add(SGX.config, 'exportAction').name('💾 Exportar Galería (Limpia)');

            gui.open();
        }

        // --- INPUT TRACKING (PARALLAX LOGIC) ---
        function updateTracking(nx, ny) {
            const dirX = SGX.config.invertirX ? -1 : 1;
            const dirY = SGX.config.invertirY ? -1 : 1;
            const multiplier = SGX.config.modo === 'Portal (Físico)' ? -1 : 1;

            SGX.targetCamX = nx * SGX.config.amplitudX * dirX * multiplier;
            SGX.targetCamY = -ny * SGX.config.amplitudY * dirY * multiplier;

            document.getElementById('hud-x').innerText = SGX.targetCamX.toFixed(2);
            document.getElementById('hud-y').innerText = SGX.targetCamY.toFixed(2);
        }

        window.addEventListener('pointermove', (e) => {
            if (SGX.trackingMode === 'Manual') {
                const nx = (e.clientX / window.innerWidth - 0.5) * 2;
                const ny = (e.clientY / window.innerHeight - 0.5) * 2;
                updateTracking(nx, ny);
            }
        });

        // --- MEDIA PIPE IA ---
        const video = document.getElementById('webcam_feed');
        const faceMesh = new window.FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });
        faceMesh.onResults((res) => {
            if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
                const nose = res.multiFaceLandmarks[0][1];
                updateTracking((nose.x - 0.5) * 2, (nose.y - 0.5) * 2);
            }
        });

        async function aiLoop() {
            if (SGX.trackingMode === 'Face IA') {
                await faceMesh.send({image: video});
                requestAnimationFrame(aiLoop);
            }
        }

        // --- STARTUP FLOW & AI TOGGLE ---
        function launch(mode) {
            SGX.trackingMode = mode;
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('nav-controls').style.display = 'flex';
                
                if (!isExported) {
                    document.getElementById('btn-ai-toggle').style.display = 'block';
                    document.getElementById('hud').style.display = 'block';
                    document.getElementById('hud-mode').innerText = mode;
                    if (!document.querySelector('.lil-gui')) {
                        initGUI();
                    }
                }
            }, 600);
        }

        const btnAiToggle = document.getElementById('btn-ai-toggle');
        btnAiToggle.onclick = async () => {
            if (SGX.trackingMode === 'Face IA') {
                SGX.trackingMode = 'Manual';
                btnAiToggle.innerText = "📸 ACTIVAR IA";
                document.getElementById('hud-mode').innerText = 'Manual';
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        SGX.trackingMode = 'Face IA';
                        btnAiToggle.innerText = "🖱️ MODO MANUAL";
                        document.getElementById('hud-mode').innerText = 'Face IA';
                        aiLoop();
                    };
                } catch (e) {
                    alert("No se detectó cámara o permiso denegado.");
                }
            }
        };

        document.getElementById('btn-manual').onclick = () => launch('Manual');
        document.getElementById('btn-start').onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    launch('Face IA');
                    aiLoop();
                };
            } catch (e) {
                alert("No se detectó cámara. Cambiando a Modo Manual (Mouse/Touch).");
                launch('Manual');
            }
        };

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Transición suave de ángulo
            SGX.currentAngle += (SGX.targetAngle - SGX.currentAngle) * 0.05;

            // Ajustar Z Base. Cuando mira al fondo (0) distancia positiva. Cuando rota (lados/atrás) es 0 para estar en el centro.
            let targetZBase = (SGX.targetAngle === 0) ? SGX.config.camDistance : 0;
            SGX.currentCamZBase += (targetZBase - SGX.currentCamZBase) * 0.05;

            // Parallax local
            SGX.currentCamX += (SGX.targetCamX - SGX.currentCamX) * SGX.config.suavizado;
            SGX.currentCamY += (SGX.targetCamY - SGX.currentCamY) * SGX.config.suavizado;

            const offsetX = Math.cos(SGX.currentAngle) * SGX.currentCamX;
            const offsetZ = Math.sin(SGX.currentAngle) * SGX.currentCamX;

            camera.position.x = offsetX;
            camera.position.y = SGX.currentCamY;
            camera.position.z = SGX.currentCamZBase + offsetZ; 

            const lookDist = 20;
            const lookX = camera.position.x + Math.sin(SGX.currentAngle) * lookDist;
            const lookZ = camera.position.z - Math.cos(SGX.currentAngle) * lookDist;
            
            camera.lookAt(lookX, camera.position.y, lookZ);

            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
